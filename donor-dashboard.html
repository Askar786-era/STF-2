<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donor Dashboard - Stranger to Friends</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }
        .dashboard-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin: 20px 0;
        }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
        .toggle-btn {
            background: #ff4b2b;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        /* Call Modal */
        #callModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 1000;
        }
        .modal-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .accept { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .decline { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h2>Welcome, <span id="donorName">Donor</span></h2>
        <p>Blood Group: <span id="bloodGroup">-</span></p>
        
        <div id="statusBadge" class="status-badge offline">Offline</div>
        
        <button id="toggleOnline" class="toggle-btn">Go Online</button>
        <p style="font-size: 12px; margin-top: 15px; color: #666;">
            When you are online, people in need can call you directly through the browser.
        </p>
    </div>

    <div id="callModal">
        <h3 id="callerInfo">Incoming Call...</h3>
        <div class="modal-btns">
            <button class="accept" id="acceptCall">Accept</button>
            <button class="decline" id="declineCall">Decline</button>
        </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const donorData = JSON.parse(localStorage.getItem('donorInfo'));
        if (!donorData) window.location.href = 'STF login.html';

        document.getElementById('donorName').innerText = donorData.fullName;
        document.getElementById('bloodGroup').innerText = donorData.bloodGroup;

        const socket = io();
        let isOnline = localStorage.getItem('isOnline') === 'true'; // Load persistent state
        let peerConnection;
        let localStream;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        const toggleBtn = document.getElementById('toggleOnline');
        const statusBadge = document.getElementById('statusBadge');

        function updateUI() {
            toggleBtn.innerText = isOnline ? 'Go Offline' : 'Go Online';
            toggleBtn.style.background = isOnline ? '#666' : '#ff4b2b';
            statusBadge.innerText = isOnline ? 'Online' : 'Offline';
            statusBadge.className = 'status-badge ' + (isOnline ? 'online' : 'offline');
        }

        // Sync UI with initial state
        updateUI();

        if (isOnline && donorData) {
            socket.emit('donorOnline', donorData.phone);
        }
        // Handle auto-answer from global notification
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('answer') === 'true') {
            const pending = JSON.parse(localStorage.getItem('pendingCall'));
            if (pending) {
                setTimeout(() => {
                    handleIncomingCall(pending.signal, pending.from, pending.callerSocket);
                }, 500);
                localStorage.removeItem('pendingCall');
            }
        }

        socket.on('connect', () => {
            if (isOnline && donorData) socket.emit('donorOnline', donorData.phone);
        });

        socket.on('disconnect', () => {
            statusBadge.innerText = 'Disconnected';
            statusBadge.className = 'status-badge offline';
            statusBadge.style.border = 'none';
        });

        toggleBtn.onclick = () => {
            isOnline = !isOnline;
            localStorage.setItem('isOnline', isOnline); // Persist state
            if (isOnline) {
                socket.emit('donorOnline', donorData.phone);
            } else {
                socket.emit('donorOffline', donorData.phone);
            }
            updateUI();
        };

        // Shared function for answering calls
        async function handleIncomingCall(signal, from, callerSocket) {
            callerSocketId = callerSocket;
            document.getElementById('callModal').style.display = 'block';
            document.getElementById('callerInfo').innerText = `Incoming Call from ${from}`;

            document.getElementById('acceptCall').onclick = async () => {
                document.getElementById('callModal').style.display = 'none';
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                peerConnection = new RTCPeerConnection(config);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteAudio').srcObject = event.streams[0];
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('iceCandidate', { to: callerSocketId, candidate: event.candidate });
                    }
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                socket.emit('answerCall', { signal: answer, to: callerSocketId });
            };
        }

        let callerSocketId;
        socket.on('incomingCall', (data) => {
            handleIncomingCall(data.signal, data.from, data.callerSocket);
        });

        socket.on('iceCandidate', (candidate) => {
            if (peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        document.getElementById('declineCall').onclick = () => {
            document.getElementById('callModal').style.display = 'none';
        };
    </script>
</body>
</html>
